name: Deploy Backend to Render

# Render puede auto-desplegar en cada push (autoDeploy: true en render.yaml).
# Este workflow ofrece control extra: dispara el deploy SOLO cuando cambian
# archivos del backend, y espera a que el build de CI haya pasado.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    # Solo desplegar si el CI terminó correctamente
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Call Render deploy hook
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "::error::Falta el secret RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsSL "${RENDER_DEPLOY_HOOK_URL}"
        env:
          # GitHub repo → Settings → Secrets and variables → Actions → Secrets
          # Obtén la URL en: Render → tu servicio → Settings → Deploy Hook
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
