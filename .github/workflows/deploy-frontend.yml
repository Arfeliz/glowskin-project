name: Deploy Frontend to GitHub Pages

on:
  # Solo despliega cuando el CI termina bien en master
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys paralelos; no cancela el que está en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: glowskin-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glowskin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # URL de la API en Render — configúrala en:
          # GitHub repo → Settings → Secrets and variables → Actions → Variables
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Base path para GitHub Pages (/glowskin-project/)
          VITE_BASE_PATH: /glowskin-project/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: glowskin-frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
