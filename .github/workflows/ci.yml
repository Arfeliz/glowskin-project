name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glowskin-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glowskin-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  frontend:
    name: Frontend · lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glowskin-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glowskin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # URL pública del backend en Render. Configúrala en:
          # GitHub repo → Settings → Secrets and variables → Actions → Variables
          VITE_API_URL: ${{ vars.VITE_API_URL }}
